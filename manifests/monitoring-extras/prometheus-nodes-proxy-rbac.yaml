# El scrape del edge va por el proxy del API server
# (/api/v1/nodes/<edge>/proxy/metrics...), que exige el verbo get sobre
# nodes/proxy — permiso que el ClusterRole de kube-prometheus-stack no trae.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-nodes-proxy
rules:
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-nodes-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-nodes-proxy
subjects:
  - kind: ServiceAccount
    name: monitoring-kube-prometheus-prometheus
    namespace: monitoring
