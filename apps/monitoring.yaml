apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.5.1
    helm:
      valuesObject:
        # Cluster chico (2x B2s + 1 edge): sin alertmanager, retencion corta,
        # requests modestos para que todo entre.
        alertmanager:
          enabled: false
        prometheus:
          prometheusSpec:
            retention: 24h
            resources:
              requests:
                memory: 400Mi
                cpu: 100m
              limits:
                memory: 900Mi
            # scrape extra: cAdvisor/metrics del edged (puerto 10350) via el
            # tunel cloudStream/edgeStream de KubeEdge (iptables-manager DNATea
            # el trafico cloud->edge:10350 hacia cloudcore:10003).
            additionalScrapeConfigs:
              - job_name: kubeedge-edge-cadvisor
                scheme: https
                tls_config:
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                metrics_path: /metrics/cadvisor
                static_configs:
                  - targets: ["192.168.252.2:10350"]
                    labels:
                      node: kubeedge-edge01
              - job_name: kubeedge-edge-kubelet
                scheme: https
                tls_config:
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                metrics_path: /metrics
                static_configs:
                  - targets: ["192.168.252.2:10350"]
                    labels:
                      node: kubeedge-edge01
        grafana:
          service:
            type: LoadBalancer
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
        kube-state-metrics:
          resources:
            requests:
              memory: 64Mi
              cpu: 20m
        prometheusOperator:
          resources:
            requests:
              memory: 100Mi
              cpu: 50m
        # node-exporter: 9100 ya esta ocupado en los nodos AKS -> 9110.
        # Y excluido del edge: Prometheus no alcanza su 9110 detras del NAT
        # (el tunel de KubeEdge solo proxya el puerto del kubelet/edged).
        prometheus-node-exporter:
          service:
            port: 9110
            targetPort: 9110
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/edge
                        operator: DoesNotExist
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
