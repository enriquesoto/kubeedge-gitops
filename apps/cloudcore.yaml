apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudcore
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/enriquesoto/kubeedge-gitops.git
    targetRevision: main
    path: charts/cloudcore/chart
    helm:
      valueFiles:
        - ../values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kubeedge
  syncPolicy:
    automated:
      prune: true
      # selfHeal off: the cloudcore Secret is a Helm pre-install hook with
      # hook-delete-policy=before-hook-creation, so Argo CD deletes and
      # recreates it on every sync. With selfHeal it kept re-triggering
      # syncs every ~10-20s, racing the hostNetwork pod's volume mount.
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # aggregationRule-based ClusterRoles have their `rules` filled in
    # server-side by Kubernetes; git never has that field, so it's a
    # permanent, harmless diff otherwise.
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cloudcore
      jsonPointers:
        - /rules
