# Override values for the vendored kubeedge/cloudcore chart (./chart).
# Applied on top of ./chart/values.yaml.

cloudCore:
  # Default hostNetWork:true binds the pod directly to host ports, which on
  # a 1-node cluster means any pod recreation has to wait for the old pod
  # to release the port before it can even be scheduled. We expose CloudHub
  # via the LoadBalancer Service below instead, so this isn't needed.
  hostNetWork: false
  service:
    # The upstream chart's own Service only supports NodePort/ClusterIP;
    # this enables the extra LoadBalancer Service added in
    # templates/service_cloudcore_lb.yaml, needed because AKS nodes have
    # no public IP.
    loadBalancerEnable: true
  modules:
    cloudHub:
      # External IP of the cloudcore-lb Service (kubectl get svc cloudcore-lb -n kubeedge).
      advertiseAddress:
        - "172.176.51.34"
