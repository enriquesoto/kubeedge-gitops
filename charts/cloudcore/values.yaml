# Override values for the vendored kubeedge/cloudcore chart (./chart).
# Applied on top of ./chart/values.yaml.

cloudCore:
  service:
    # The upstream chart's own Service only supports NodePort/ClusterIP;
    # this enables the extra LoadBalancer Service added in
    # templates/service_cloudcore_lb.yaml, needed because AKS nodes have
    # no public IP.
    loadBalancerEnable: true
  modules:
    cloudHub:
      # Placeholder — must be a syntactically valid IP or CloudCore panics
      # on startup (x509 SAN parsing). After the LoadBalancer Service gets
      # its external IP (kubectl get svc cloudcore-lb -n kubeedge), replace
      # this and commit — Argo CD will self-heal.
      advertiseAddress:
        - "0.0.0.0"
